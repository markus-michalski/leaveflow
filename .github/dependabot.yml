version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    ignore:
      # Symfony 8.x not planned yet — stay on 7.4.* until all deprecations
      # are resolved. versions[] is reliable for group updates; update-types
      # is not (Dependabot bypasses it for transitive deps in groups).
      - dependency-name: "symfony/*"
        versions: [">=8.0"]
      - dependency-name: "symfonycasts/*"
        versions: [">=8.0"]
      # Doctrine packages sit on mixed major versions (bundle ^2, orm ^3).
      - dependency-name: "doctrine/*"
        update-types: ["version-update:semver-major"]
    groups:
      symfony-updates:
        patterns:
          - "symfony/*"
        update-types:
          - "minor"
          - "patch"
      composer-all:
        patterns:
          - "*"
        exclude-patterns:
          - "symfony/*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns:
          - "*"
