version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    ignore:
      # Symfony 8.x: not planned until at least 8.1. Explicit version
      # constraint is more reliable than update-types for transitive deps.
      - dependency-name: "symfony/*"
        versions: [">=8.0.0"]
      # Doctrine packages sit on mixed major versions (bundle ^2, orm ^3).
      # update-types works reliably here since all Doctrine deps are direct.
      - dependency-name: "doctrine/*"
        update-types: ["version-update:semver-major"]
    groups:
      composer-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns:
          - "*"
