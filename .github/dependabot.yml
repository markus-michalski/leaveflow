version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    ignore:
      # Symfony 8.x upgrade in progress (PR #162 — migration/symfony-8.1).
      # Remove this block after #162 is merged; update to >=9.0 at that point.
      - dependency-name: "symfony/*"
        versions: [">=8.2"]
      - dependency-name: "symfonycasts/*"
        versions: [">=8.2"]
      # Doctrine packages sit on mixed major versions (bundle ^2, orm ^3).
      - dependency-name: "doctrine/*"
        update-types: ["version-update:semver-major"]
    groups:
      symfony-updates:
        patterns:
          - "symfony/*"
        update-types:
          - "minor"
          - "patch"
      composer-all:
        patterns:
          - "*"
        exclude-patterns:
          - "symfony/*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns:
          - "*"
