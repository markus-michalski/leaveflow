version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    ignore:
      # Symfony 8.x not planned yet — stay on 7.4.* until all deprecations
      # are resolved. update-types is more reliable than versions[] for
      # grouped updates where Dependabot bypasses version range checks.
      - dependency-name: "symfony/*"
        update-types: ["version-update:semver-major"]
      # Doctrine packages sit on mixed major versions (bundle ^2, orm ^3).
      - dependency-name: "doctrine/*"
        update-types: ["version-update:semver-major"]
      # tailwind-bundle >=0.13 requires Symfony 8 components — block minor+major
      # until Symfony 8 migration is done.
      - dependency-name: "symfonycasts/tailwind-bundle"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    groups:
      symfony-updates:
        patterns:
          - "symfony/*"
        update-types:
          - "minor"
          - "patch"
      composer-all:
        patterns:
          - "*"
        exclude-patterns:
          - "symfony/*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns:
          - "*"
