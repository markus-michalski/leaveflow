name: CI

on:
  push:
    branches:
      - main
      - 'phase/**'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match the timezone Symfony Clock/MockClock uses in tests.
  TZ: Europe/Berlin

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_mysql, zip, pcntl, opcache, apcu, pcov, ldap
          coverage: pcov
          ini-values: |
            date.timezone=Europe/Berlin
            memory_limit=512M

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP-CS-Fixer
        env:
          PHP_CS_FIXER_IGNORE_ENV: 1
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction

      - name: Warm cache for PHPStan Symfony container analysis
        run: |
          mkdir -p var/cache
          bin/console cache:warmup --env=dev --no-debug
        env:
          APP_ENV: dev
          APP_SECRET: ci-secret-does-not-matter
          DATABASE_URL: mysql://app:app@127.0.0.1:3306/app?serverVersion=11.4.2-MariaDB&charset=utf8mb4

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress --error-format=github

      - name: Deptrac
        run: vendor/bin/deptrac analyse --no-progress

  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: app_test
          MARIADB_USER: app
          MARIADB_PASSWORD: app
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025

      openldap:
        image: osixia/openldap:1.5.0
        env:
          LDAP_ORGANISATION: "LeaveFlow Test"
          LDAP_DOMAIN: leaveflow.test
          LDAP_ADMIN_PASSWORD: adminpassword
        ports:
          - 1389:389
        options: >-
          --health-cmd "ldapsearch -x -H ldap://localhost -b dc=leaveflow,dc=test -D cn=admin,dc=leaveflow,dc=test -w adminpassword || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: test
      APP_SECRET: ci-secret-does-not-matter
      DATABASE_URL: mysql://app:app@127.0.0.1:3306/app?serverVersion=11.4.2-MariaDB&charset=utf8mb4
      MAILER_DSN: smtp://127.0.0.1:1025
      LDAP_HOST: 127.0.0.1
      LDAP_PORT: "1389"
      LDAP_ADMIN_DN: cn=admin,dc=leaveflow,dc=test
      LDAP_ADMIN_PASSWORD: adminpassword
      LDAP_BASE_DN: dc=leaveflow,dc=test

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_mysql, zip, pcntl, opcache, apcu, pcov, ldap
          coverage: pcov
          ini-values: |
            date.timezone=Europe/Berlin
            memory_limit=512M

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create test database schema
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Build Tailwind stylesheet
        run: php bin/console tailwind:build --minify

      - name: PHPUnit
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage to artifacts
        if: matrix.php == '8.4'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7
