# See the configuration reference at https://symfony.com/bundles/SchebTwoFactorBundle/8.x/configuration.html
scheb_two_factor:
    # Standard form-login tokens — we don't have a separate API auth path yet.
    security_tokens:
        - Symfony\Component\Security\Core\Authentication\Token\UsernamePasswordToken
        - Symfony\Component\Security\Http\Authenticator\Token\PostAuthenticationToken

    totp:
        enabled: true
        # Issuer is shown in the authenticator app (Google Authenticator etc.)
        # so users can tell which LeaveFlow tenant the code belongs to. Pinned
        # to a single string for now — multi-tenant deployments would want to
        # dynamic-prefix per company name in v2.
        server_name: 'LeaveFlow'
        issuer: 'LeaveFlow'
        template: 'security/2fa_form.html.twig'
        # RFC 6238 defaults — matches Google Authenticator / Authy / 1Password.
        parameters:
            digits: 6
            period: 30
            algorithm: sha1

    backup_codes:
        enabled: true
