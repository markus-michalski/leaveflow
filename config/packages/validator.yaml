framework:
    validation:
        # Enables validator auto-mapping support.
        # For instance, basic validation constraints will be inferred from Doctrine's metadata.
        #auto_mapping:
        #    App\Entity\: []

        # Keep all user-facing strings (labels, flashes, constraint errors)
        # in a single translation file instead of splitting across
        # messages.*.yaml and validators.*.yaml.
        translation_domain: messages

when@test:
    framework:
        validation:
            not_compromised_password: false
