; Dev-only PHP overrides

; Full error reporting.
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; OPcache — validate timestamps so edits show up without rebuild.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Higher memory during dev (composer install, cache clear, phpstan).
memory_limit = 1G

; Xdebug defaults (enabled only when XDEBUG_MODE is set to debug/coverage/develop)
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.start_with_request = trigger
xdebug.discover_client_host = 0
