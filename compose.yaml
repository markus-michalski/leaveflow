services:
  app:
    build:
      context: .
      target: dev
      args:
        USER_ID: "${USER_ID:-1000}"
        GROUP_ID: "${GROUP_ID:-1000}"
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started
    environment:
      APP_ENV: dev
      SERVER_NAME: "${SERVER_NAME:-:80}"
      DATABASE_URL: "mysql://app:!ChangeMe!@database:3306/app?serverVersion=11.4.2-MariaDB&charset=utf8mb4"
      MAILER_DSN: "smtp://mailer:1025"
    volumes:
      - .:/app
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  database:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: app
      MARIADB_USER: app
      MARIADB_PASSWORD: "!ChangeMe!"
      MARIADB_ROOT_PASSWORD: "!ChangeMe!"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - database_data:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  mailer:
    image: axllent/mailpit:latest
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

  # OpenLDAP for local LDAP login development and integration tests.
  # Accessible from the app container as ldap://openldap:389
  openldap:
    image: osixia/openldap:1.5.0
    environment:
      LDAP_ORGANISATION: "LeaveFlow Test"
      LDAP_DOMAIN: leaveflow.test
      LDAP_ADMIN_PASSWORD: adminpassword
    volumes:
      - ./docker/openldap/fixture.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/fixture.ldif:ro
    command: --copy-service
    ports:
      - "1389:389"
    restart: unless-stopped

volumes:
  database_data:
  caddy_data:
  caddy_config:
